[profile.default]
src = "contracts"
evm_version = "paris"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache_forge"
build_info = true
extra_output = ["storageLayout"]
optimizer = true
optimizer_runs = 1
solc_version = "0.8.30"
bytecode_hash = "none"
cbor_metadata = false
create2_deployer = "0x914d7Fec6aaC8cd542e72Bca78B30650d45643d7" # Safe Singleton Factory address
ignored_warnings_from = ["test", "script"]
# File system permissions for Config contract to read/write TOML files
fs_permissions = [{ access = "read-write", path = "./config/" }]

# Production profile for deployment with optimized IR compilation
[profile.production]
out = "out-production"
test = "test"
via_ir = true

[fmt]
sort_imports = true
int_types = "long"
quote_style = "double" 
number_underscore = "thousands"

# --snip--
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
tenderly = "${TENDERLY_RPC_URL}"
